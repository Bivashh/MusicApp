<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 to-emerald-200 min-h-screen">

<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-gray-800">My Profile</h2>
    <a href="/student/dashboard/" class="text-indigo-700 hover:underline font-semibold">← Back to Dashboard</a>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-8">
    <div class="grid md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
        <input class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
               placeholder="Your name" value="{{ student.full_name|default:'' }}">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
        <input class="w-full px-4 py-3 border rounded-xl bg-gray-100"
               placeholder="Email" value="{{ student.email|default:'' }}" disabled>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Phone</label>
        <input class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
               placeholder="98XXXXXXXX" value="{{ student.phone|default:'' }}">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Address</label>
        <input class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
               placeholder="Kathmandu, Nepal" value="{{ student.address|default:'' }}">
      </div>
    </div>

    <div class="mt-8 flex gap-3 flex-wrap">
      <button class="px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition">
        Save Changes
      </button>
      <a href="/student/change-password/" class="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition">
        Change Password
      </a>
    </div>

  </div>
</div>

</body>
</html>
