<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-100 to-emerald-200 min-h-screen">
<div class="max-w-6xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-gray-800">My Results</h2>
    <a href="/student/dashboard/" class="px-5 py-2 bg-white rounded-xl shadow hover:shadow-md font-semibold text-gray-700">← Back</a>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-6">
    <table class="w-full">
      <thead>
        <tr class="text-left text-gray-600 border-b">
          <th class="py-3">Assessment</th>
          <th class="py-3">Class</th>
          <th class="py-3">Score</th>
          <th class="py-3">Feedback</th>
        </tr>
      </thead>
      <tbody>
        {% for s in submissions %}
        <tr class="border-b hover:bg-gray-50">
          <td class="py-4 font-semibold text-indigo-700">{{ s.assessment.title }}</td>
          <td class="py-4">{{ s.assessment.class_schedule.class_name }}</td>
          <td class="py-4">
            {% if s.score is not None %}
              <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full font-semibold">{{ s.score }}</span>
            {% else %}
              <span class="text-gray-400">Not graded</span>
            {% endif %}
          </td>
          <td class="py-4 text-gray-600">{{ s.feedback|default:"-" }}</td>
        </tr>
        {% empty %}
        <tr><td class="py-6 text-center text-gray-500" colspan="4">No submissions yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
