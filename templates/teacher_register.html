<!DOCTYPE html>
<html>
<head>
  <title>Teacher Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-green-500 to-emerald-600 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">
  <h2 class="text-xl font-bold mb-6 text-center">Teacher Registration</h2>

  <form method="POST">
    {% csrf_token %}
    <input name="name" placeholder="Full Name" class="input">
    <input name="email" placeholder="Email" class="input">
    <input name="password" type="password" placeholder="Password" class="input">

    <button class="btn-green">Register</button>
  </form>
</div>

<style>
.input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px}
.btn-green{width:100%;background:#059669;color:white;padding:10px;border-radius:8px}
</style>

</body>
</html>
