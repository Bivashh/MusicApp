<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
  <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>

  {% if error %}
    <div class="mb-4 p-3 rounded-xl bg-red-100 text-red-700 font-semibold">{{ error }}</div>
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}
    <input name="username" placeholder="Username"
      class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
    <input name="password" type="password" placeholder="Password"
      class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">

    <button class="w-full py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-semibold">
      Login
    </button>
  </form>
</div>

</body>
</html>
