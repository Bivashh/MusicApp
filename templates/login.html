<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
  <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

  <form method="POST">
    {% csrf_token %}
    <input name="email" placeholder="Email"
      class="w-full mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <input name="password" type="password" placeholder="Password"
      class="w-full mb-6 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
      Login
    </button>
  </form>

  <div class="text-center mt-6 text-sm">
    <a href="/register/student/" class="text-indigo-600 hover:underline">Student Register</a> |
    <a href="/register/teacher/" class="text-green-600 hover:underline">Teacher Register</a>
  </div>
</div>

</body>
</html>
