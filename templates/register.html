<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Register</h2>
    
    <form method="POST" action="{% url 'register' %}">
      {% csrf_token %}

      {% if messages %}
    <div>
      {% for message in messages %}
        <p class="text-red-600">{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Choose a username"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="password1">Password</label>
        <input type="password" name="password1" id="password1" placeholder="Enter password"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="password2">Confirm Password</label>
        <input type="password" name="password2" id="password2" placeholder="Confirm password"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>

      <button type="submit"
              class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">Register</button>
    </form>

    <p class="text-center mt-4 text-gray-600">
      Already have an account? 
      <a href="{% url 'login' %}" class="text-green-500 hover:underline">Login</a>
    </p>
  </div>

</body>
</html>
