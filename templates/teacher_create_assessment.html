<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Create Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 min-h-screen">
<div class="max-w-3xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-white">Create Assessment</h2>
    <a href="/teacher/assessments/" class="px-5 py-2 bg-white/10 text-white rounded-xl font-semibold hover:bg-white/20">← Back</a>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-8">
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Class</label>
        <select name="schedule_id" class="w-full px-4 py-3 border rounded-xl bg-gray-50">
          {% for c in classes %}
            <option value="{{ c.schedule_id }}">{{ c.class_name }} ({{ c.date }})</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Title</label>
        <input name="title" class="w-full px-4 py-3 border rounded-xl" placeholder="e.g. Pitch Practice 01" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Instructions</label>
        <textarea name="instructions" rows="4" class="w-full px-4 py-3 border rounded-xl" placeholder="What should students do?"></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Deadline</label>
        <input type="date" name="deadline" class="w-full px-4 py-3 border rounded-xl" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Reference Audio (optional)</label>
        <input type="file" name="reference_audio" accept="audio/*" class="w-full px-4 py-3 border rounded-xl bg-gray-50">
      </div>

      <button class="w-full py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-semibold">
        Create
      </button>
    </form>
  </div>
</div>
</body>
</html>
