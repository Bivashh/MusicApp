<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Create Assessment · Narajyoti Music School</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'Georgia', 'serif'],
            sans: ['Nunito', 'sans-serif'],
          },
          colors: {
            green: {
              50:  '#f4f8f3',
              100: '#eef4ec',
              200: '#c8dac3',
              300: '#7a9e6f',
              400: '#5c7f52',
              500: '#4a6741',
              600: '#3d5636',
            },
            cream: {
              50:  '#fdfaf5',
              100: '#f9f5ee',
              200: '#f3ede2',
              300: '#ede4d6',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-cream-100 min-h-screen text-stone-800 font-sans antialiased">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-40 border-b border-cream-300 bg-cream-100/90 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-5 md:px-8 py-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-green-500 text-white flex items-center justify-center text-2xl">
          🎵
        </div>
        <div>
          <p class="font-serif text-2xl text-green-500 leading-none">Narajyoti</p>
          <p class="text-[10px] font-bold text-stone-400 tracking-[0.18em] uppercase mt-1">Teacher Portal</p>
        </div>
      </div>

      <div class="flex flex-wrap gap-3">
        <a href="/teacher/dashboard/" class="px-4 py-2.5 rounded-full border border-cream-300 bg-white hover:text-green-500 font-semibold">
          Dashboard
        </a>
        <a href="/teacher/assessments/" class="px-4 py-2.5 rounded-full bg-green-500 text-white font-semibold">
          Assessments
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-5 py-10 space-y-8">

    <!-- HERO -->
    <section class="rounded-[2rem] border border-green-200 bg-gradient-to-br from-green-600 via-green-500 to-green-400 text-white p-10 shadow-lg">
      <h1 class="font-serif text-4xl md:text-5xl">Create Assessment</h1>
      <p class="mt-4 text-green-100">
        Create a task for students and optionally attach a reference audio.
      </p>
    </section>

    <!-- FORM -->
    <section class="bg-white rounded-[1.75rem] border border-cream-300 shadow p-8">

      <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <div>
          <label class="block text-xs font-bold uppercase text-stone-400 mb-2">Class</label>
          <select name="schedule_id" class="w-full px-4 py-3 rounded-2xl border border-cream-300 bg-cream-50 focus:ring-2 focus:ring-green-200">
            {% for c in classes %}
              <option value="{{ c.schedule_id }}">{{ c.class_name }} ({{ c.date }})</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-stone-400 mb-2">Title</label>
          <input name="title" required
            class="w-full px-4 py-3 rounded-2xl border border-cream-300 bg-cream-50 focus:ring-2 focus:ring-green-200"
            placeholder="e.g. Pitch Practice 01">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-stone-400 mb-2">Instructions</label>
          <textarea name="instructions" rows="4"
            class="w-full px-4 py-3 rounded-2xl border border-cream-300 bg-cream-50 focus:ring-2 focus:ring-green-200"
            placeholder="What should students do?"></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-stone-400 mb-2">Deadline</label>
          <input type="date" name="deadline" required
            class="w-full px-4 py-3 rounded-2xl border border-cream-300 bg-cream-50 focus:ring-2 focus:ring-green-200">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-stone-400 mb-2">Reference Audio (optional)</label>
          <input type="file" name="reference_audio" accept="audio/*"
            class="w-full px-4 py-3 rounded-2xl border border-cream-300 bg-cream-50">
        </div>

        <button class="w-full py-3 rounded-2xl bg-green-500 text-white font-bold hover:bg-green-400 transition">
          Create Assessment
        </button>

      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="mt-10 border-t border-green-200 bg-green-500 text-white py-6 text-center">
    Narajyoti Music School · Teacher Portal
  </footer>

</body>
</html>
