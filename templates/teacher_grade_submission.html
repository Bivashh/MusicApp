<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grade Submission</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 min-h-screen">
<div class="max-w-3xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-white">Grade Submission</h2>
    <a href="/teacher/assessments/{{ s.assessment.assessment_id }}/submissions/"
       class="px-5 py-2 bg-white/10 text-white rounded-xl font-semibold hover:bg-white/20">← Back</a>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-8">
    <p class="text-gray-700"><span class="font-semibold">Student:</span> {{ s.student.full_name }}</p>
    <p class="text-gray-700"><span class="font-semibold">Assessment:</span> {{ s.assessment.title }}</p>

    <div class="mt-4">
      <p class="font-semibold text-gray-700 mb-2">Audio</p>
      <audio controls class="w-full">
        <source src="{{ s.student_audio.url }}">
      </audio>
    </div>

    <form method="POST" class="mt-6 space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Score (0-100)</label>
        <input type="number" name="score" min="0" max="100"
               value="{{ s.score|default_if_none:'' }}"
               class="w-full px-4 py-3 border rounded-xl" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Feedback</label>
        <textarea name="feedback" rows="4" class="w-full px-4 py-3 border rounded-xl"
                  placeholder="Write feedback...">{{ s.feedback|default_if_none:'' }}</textarea>
      </div>

      <button class="w-full py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-semibold">
        Save Grade
      </button>
    </form>
  </div>
</div>
</body>
</html>
