<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Class</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

  <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
    Create Class Schedule
  </h2>

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <!-- Class Name -->
    <input
      type="text"
      name="class_name"
      placeholder="Class Name"
      required
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
    >

    <!-- Date -->
    <input
      type="date"
      name="date"
      required
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
    >

    <!-- Start Time -->
    <input
      type="time"
      name="start_time"
      required
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
    >

    <!-- End Time -->
    <input
      type="time"
      name="end_time"
      required
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
    >

    <button
      type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
      Create
    </button>
  </form>

  <a
    href="/teacher/dashboard/"
    class="block text-center mt-4 text-indigo-600 hover:underline">
    ← Back to Dashboard
  </a>

</div>

</body>
</html>
