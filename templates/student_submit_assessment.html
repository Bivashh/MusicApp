<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Submit Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-100 to-emerald-200 min-h-screen">
<div class="max-w-3xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Submit Audio</h2>
    <a href="/student/assessments/" class="px-5 py-2 bg-white rounded-xl shadow hover:shadow-md font-semibold text-gray-700">← Back</a>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h3 class="text-xl font-bold text-indigo-700 mb-2">{{ a.title }}</h3>
    <p class="text-gray-600 mb-4">Deadline: {{ a.deadline }}</p>

    {% if error %}
      <div class="mb-4 p-3 rounded-xl bg-red-100 text-red-700 font-semibold">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Upload Audio</label>
        <input type="file" name="student_audio" accept="audio/*"
               class="w-full px-4 py-3 border rounded-xl bg-gray-50" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-2">Comment (optional)</label>
        <textarea name="comment" rows="3" class="w-full px-4 py-3 border rounded-xl"
                  placeholder="Any note for teacher..."></textarea>
      </div>

      <button class="w-full py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-semibold">
        Submit
      </button>
    </form>
  </div>
</div>
</body>
</html>
