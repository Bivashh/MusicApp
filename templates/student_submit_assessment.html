<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Submit Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800">
<div class="max-w-3xl mx-auto py-10 px-5">
  <div class="flex items-center justify-between mb-8">
    <div>
      <p class="text-sm font-semibold text-amber-700">Student Portal</p>
      <h2 class="text-3xl font-extrabold text-stone-900">Submit Audio</h2>
    </div>
    <a href="/student/assessments/" class="px-5 py-2 rounded-full border border-stone-300 hover:border-amber-500 hover:bg-white font-semibold">← Back</a>
  </div>

  <div class="bg-white rounded-3xl border border-stone-200 shadow-sm p-8">
    <h3 class="text-2xl font-bold text-stone-900 mb-2">{{ a.title }}</h3>
    <p class="text-stone-500 mb-6">Deadline: {{ a.deadline }}</p>

    {% if error %}
      <div class="mb-4 p-3 rounded-2xl bg-red-50 border border-red-200 text-red-700 font-semibold">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-stone-600 mb-2">Upload Audio</label>
        <input type="file" name="student_audio" accept="audio/*" class="w-full px-4 py-3 border border-stone-200 rounded-2xl bg-stone-50" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-stone-600 mb-2">Comment (optional)</label>
        <textarea name="comment" rows="4" class="w-full px-4 py-3 border border-stone-200 rounded-2xl bg-stone-50 outline-none focus:ring-2 focus:ring-amber-400" placeholder="Any note for teacher..."></textarea>
      </div>
      <button class="w-full py-3 bg-amber-800 text-white rounded-2xl hover:bg-amber-900 font-semibold">Submit</button>
    </form>
  </div>
</div>
</body>
</html>
