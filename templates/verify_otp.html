<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify OTP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800">

<div class="max-w-md mx-auto py-16 px-4">
  <div class="bg-white rounded-3xl border border-stone-200 shadow-sm p-8">
    <h2 class="text-3xl font-extrabold text-stone-900">Verify OTP</h2>
    <p class="text-stone-600 mt-2">Enter the 6-digit OTP sent to your email.</p>

    {% if messages %}
      <div class="mt-4 space-y-2">
        {% for message in messages %}
          <div class="p-3 rounded-2xl border
            {% if message.tags == 'error' %} bg-red-50 border-red-200 text-red-800
            {% else %} bg-emerald-50 border-emerald-200 text-emerald-800 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" class="mt-6 space-y-4">
      {% csrf_token %}
      <input name="otp" maxlength="6" placeholder="Enter OTP"
             class="w-full px-4 py-3 rounded-2xl bg-stone-50 border border-stone-200 outline-none focus:ring-2 focus:ring-amber-400"
             required>
      <button class="w-full py-3 rounded-2xl bg-amber-800 text-white hover:bg-amber-900 font-semibold">
        Verify
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="/resend-otp/" class="text-amber-900 font-semibold hover:underline">Resend OTP</a>
    </div>
  </div>
</div>

</body>
</html>
