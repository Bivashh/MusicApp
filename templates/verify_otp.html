<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Verify Your OTP</h2>

    <p class="text-gray-600 text-center mb-4">
      Enter the 6-digit code sent to your email.
    </p>

    <form method="POST" action="{% url 'verify_otp' %}">
      {% csrf_token %}

      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="otp">OTP Code</label>
        <input type="text" name="otp" id="otp" placeholder="123456"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400">
      </div>

      <button type="submit"
              class="w-full bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 transition">
        Verify OTP
      </button>
    </form>

    <p class="text-center mt-4 text-gray-600">
      Didn't receive the OTP?
      <a href="#" class="text-purple-500 hover:underline">Resend</a>
    </p>
  </div>

</body>
</html>
