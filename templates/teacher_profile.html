<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teacher Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800">

<nav class="bg-white/90 backdrop-blur border-b border-stone-200 sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="/teacher/dashboard/" class="font-extrabold text-amber-900">🎵 Narajyoti Teacher</a>
    <a href="/teacher/dashboard/" class="px-4 py-2 rounded-full border border-stone-300 hover:border-amber-500 font-semibold">← Back</a>
  </div>
</nav>

<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="bg-white rounded-3xl border border-stone-200 shadow-sm p-8">
    <h2 class="text-3xl font-extrabold text-stone-900">My Profile</h2>
    <p class="text-stone-600 mt-2">Teacher details</p>

    <div class="mt-8 grid md:grid-cols-2 gap-6">
      <div class="p-5 rounded-2xl bg-stone-50 border border-stone-200">
        <p class="text-stone-500 font-semibold">Full Name</p>
        <p class="text-xl font-bold mt-1">{{ teacher.full_name }}</p>
      </div>

      <div class="p-5 rounded-2xl bg-stone-50 border border-stone-200">
        <p class="text-stone-500 font-semibold">Email</p>
        <p class="text-xl font-bold mt-1">{{ teacher.email }}</p>
      </div>

      <div class="p-5 rounded-2xl bg-stone-50 border border-stone-200">
        <p class="text-stone-500 font-semibold">Phone</p>
        <p class="text-xl font-bold mt-1">{{ teacher.phone }}</p>
      </div>

      <div class="p-5 rounded-2xl bg-stone-50 border border-stone-200">
        <p class="text-stone-500 font-semibold">Verified</p>
        <p class="text-xl font-bold mt-1">{% if teacher.is_verified %}Yes{% else %}No{% endif %}</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
