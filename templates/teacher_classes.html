<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Classes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen text-stone-800">

<nav class="bg-white/90 backdrop-blur border-b border-stone-200 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="/teacher/dashboard/" class="font-extrabold text-amber-900">🎵 Narajyoti Teacher</a>
    <div class="flex gap-2">
      <a href="/teacher/create-class/" class="px-4 py-2 rounded-full bg-amber-800 text-white hover:bg-amber-900 font-semibold">+ Create</a>
      <a href="/teacher/dashboard/" class="px-4 py-2 rounded-full border border-stone-300 hover:border-amber-500 font-semibold">← Back</a>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-10">
  <h2 class="text-3xl font-extrabold text-stone-900 mb-6">My Classes</h2>

  <div class="bg-white rounded-3xl border border-stone-200 shadow-sm p-6 overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-stone-600 border-b">
          <th class="py-3">Class</th>
          <th class="py-3">Date</th>
          <th class="py-3">Time</th>
        </tr>
      </thead>
      <tbody>
        {% for c in classes %}
        <tr class="border-b hover:bg-stone-50">
          <td class="py-4 font-semibold text-indigo-700">{{ c.class_name }}</td>
          <td class="py-4">{{ c.date }}</td>
          <td class="py-4">{{ c.start_time }} - {{ c.end_time }}</td>
        </tr>
        {% empty %}
        <tr><td class="py-6 text-center text-stone-500" colspan="3">No classes created yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
