<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teacher Assessments</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 min-h-screen">
<div class="max-w-6xl mx-auto py-10 px-4">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-3xl font-bold text-white">Assessments</h2>
    <div class="flex gap-3">
      <a href="/teacher/assessments/create/" class="px-5 py-2 bg-white text-indigo-700 rounded-xl font-semibold hover:bg-gray-100">+ Create</a>
      <a href="/teacher/dashboard/" class="px-5 py-2 bg-white/10 text-white rounded-xl font-semibold hover:bg-white/20">← Back</a>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-6">
    <table class="w-full">
      <thead>
        <tr class="text-left text-gray-600 border-b">
          <th class="py-3">Title</th>
          <th class="py-3">Class</th>
          <th class="py-3">Deadline</th>
          <th class="py-3">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for a in assessments %}
        <tr class="border-b hover:bg-gray-50">
          <td class="py-4 font-semibold text-indigo-700">{{ a.title }}</td>
          <td class="py-4">{{ a.class_schedule.class_name }}</td>
          <td class="py-4">{{ a.deadline }}</td>
          <td class="py-4">
            <a class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
               href="/teacher/assessments/{{ a.assessment_id }}/submissions/">
              View Submissions
            </a>
          </td>
        </tr>
        {% empty %}
        <tr><td class="py-6 text-center text-gray-500" colspan="4">No assessments yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
